# Server port ? our backend will run on http://localhost:8080
server.port=8080

# Application name ? useful for logs
spring.application.name=shoplens-backend

# Show detailed logs for our package only (helps in debugging)
logging.level.com.shoplens=DEBUG

# This tells Spring Boot to allow file uploads up to 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ?? MySQL Connection ?????????????????????????????????????
# jdbc:mysql:// = protocol telling Java to use MySQL driver
# localhost     = MySQL is running on your own laptop
# 3306          = default MySQL port number
# shoplens_db   = the database we just created in Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/shoplens_db

# The username you use to log into MySQL Workbench
spring.datasource.username=root

# Your MySQL password ? change this to YOUR actual password
spring.datasource.password=Hetvee_0109

# Tells Java which MySQL driver class to use
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? Hibernate / JPA Settings ?????????????????????????????
# update = create table if missing, alter if columns changed, never delete data
spring.jpa.hibernate.ddl-auto=update

# mysql8 = use MySQL 8 compatible SQL syntax when generating queries
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# true = print every SQL query Hibernate runs (useful for learning/debugging)
spring.jpa.show-sql=true

# Makes the printed SQL look neat and readable in the console
spring.jpa.properties.hibernate.format_sql=true

